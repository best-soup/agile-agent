server:
  port: 8080

spring:
  # 1. 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/agile_agent_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD}

  # 2. Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0


# 3. LangChain4j 大模型配置
langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${OPENAI_API_KEY}
      model-name: qwen-plus
      temperature: 0.2
    streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${OPENAI_API_KEY}
      model-name: qwen-plus
    embedding-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${OPENAI_API_KEY}
      model-name: text-embedding-v3


# 4. 对话记忆 Redis 持久化配置
agile:
  chat:
    memory:
      max-messages: 20       # 每个会话保留最近 N 条消息
      ttl-seconds: 604800    # Redis key 过期时间，默认 7 天（-1 表示永不过期）
      key-prefix: "chat:memory:"  # Redis key 前缀
      manual-key-prefix: "chat:memory:manual:"  # 手写 ReAct 独立记忆，避免与 @AiService 混用

# 5. MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true # 开启驼峰命名自动映射 (task_id -> taskId)
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开发环境打印 SQL，生产环境建议关闭

# 6. Qdrant 向量库配置
qdrant:
  enabled: true  # true=Qdrant持久化, false=内存（默认）
  host: localhost
  port: 6334      # gRPC 端口
  collection-name: agile-agent-docs

